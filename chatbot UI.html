const TOTAL_QUIZ = 10;

const CATEGORIES = [
  'Skincare & Beauty','Apparel & Fashion','Health & Supplements',
  'Food & Beverage','Hair Care','Home & Lifestyle','Pet Care',
  'Sports & Fitness','Jewelry & Accessories','Baby & Kids'
];

const QUIZ = [
  { key:'q1', multi:false, q:'How often does a typical customer buy from you?',
    opts:['Once (gift / one-time purchase)','Every 1–2 months','Every 3–6 months','Once or twice a year','High-frequency (weekly / monthly consumable)','Irregular / event-driven'], weak:[0,3,5] },
  { key:'q2', multi:false, q:'What is your current repeat purchase rate (roughly)?',
    opts:['Less than 10%','10–20%','20–35%','35–50%','Above 50%','Don\'t know'], weak:[0,1,5] },
  { key:'q3', multi:true, q:'How do you currently identify your best customers?',
    opts:['We don\'t have a system for this','Total lifetime spend','RFM score (Recency, Frequency & Monetary)','Order count threshold','Annual revenue contribution','Manual tagging by the team','App or loyalty program membership'], weak:[0,5] },
  { key:'q4', multi:false, q:'What percentage of your revenue comes from your top 20–30% of customers?',
    opts:['Less than 40%','40–55%','55–70%','70% or more','Don\'t know'], weak:[0,4] },
  { key:'q5', multi:false, q:'Do you currently run a loyalty or rewards program?',
    opts:['No program','Points-only program','Tiered program (Bronze / Silver / Gold)','Subscription / Paid membership','Hybrid (Points + Tiers + Perks)','Referral-only program'], weak:[0,1,5] },
  { key:'q6', multi:true, q:'What perks or benefits do your best customers currently receive?',
    opts:['Nothing specific','Discount codes','Free shipping','Early access to new products','Exclusive events or content','Personalized outreach','Birthday rewards','Surprise gifts','Dedicated support'], weak:[0,1] },
  { key:'q7', multi:true, q:'How do you currently communicate with customers between purchases?',
    opts:['Broadcast campaigns to all customers','Automated behavior-based flows','Personalized emails to VIP customers','SMS / Push notifications','Direct mail / Postcards','1:1 outreach from our team','We rarely communicate between purchases'], weak:[0,6] },
  { key:'q8', multi:true, q:'Which customer milestones do you currently recognize?',
    opts:['None','Birthday / Anniversary','Purchase milestones (e.g. 5th order)','Tier upgrades','First purchase anniversary','Loyalty point milestones','Review / Feedback thank you'], weak:[0] },
  { key:'q9', multi:false, q:'Do your best customers actively refer or advocate for your brand?',
    opts:['No, very few referrals','Some referrals, but not tracked','Yes, we have a referral program','Yes, customers actively share on social media / create UGC','We receive referrals but don\'t measure them'], weak:[0,1,4] },
  { key:'q10', multi:true, q:'Which retention metrics do you actively track today?',
    opts:['Revenue only','Repeat Purchase Rate','Customer Lifetime Value (CLV)','Average Order Value (AOV)','Churn Rate','Loyalty Program Redemption Rate','Net Promoter Score (NPS)','We don\'t currently track retention metrics'], weak:[0,7] }
];

const SUGGESTED_BY_AREA = {
  q1:['How do we increase purchase frequency for irregular buyers?','What repurchase triggers work best for our category?'],
  q2:['What repeat purchase rate should we target in the next 90 days?','How do we measure repeat purchase rate accurately?'],
  q3:['How should we identify VIP customers using behavioral signals?','What is an RFM-based VIP tier structure?'],
  q4:['How do we grow revenue from our top 20–30% of customers?','Why does revenue concentration matter for retention?'],
  q5:['How do we redesign our loyalty program to drive behaviour, not discounts?','What VIP tier structure fits our category?'],
  q6:['What access-led perks work better than discount codes?','How do birthday rewards drive retention without discounts?'],
  q7:['What should each channel (email, SMS, push) be responsible for?','How would a mobile app change our between-purchase strategy?'],
  q8:['Which customer milestones drive the highest repeat purchase lift?','How do birthday cards work without discounts?'],
  q9:['How do we turn loyal customers into active advocates?','What incentive structure works for ambassador programs?'],
  q10:['Which retention metrics should we track first?','How do we build a retention dashboard from scratch?']
};

const BRAND_SUMMARY_FIELDS = [
  { label:'Brand Name', get:() => raState.brand.name },
  { label:'Category', get:() => raState.brand.category },
  { label:'Web URL', get:() => raState.brand.url }
];

let raState = {
  brand:{}, answers:{}, quizStep:0, audit:null,
  followUpCount:0, chatHistory:[], sessionEnded:false,
  phase:'brand', multiSelected:new Set()
};

window.addEventListener('DOMContentLoaded', () => raShowInput('Enter your brand name...', 'name'));

/* ═══ MARKDOWN PARSER ENGINE ═══ */
function raEscapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function raStripEmojis(text) {
  return text.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').trim();
}

function raFixClumping(md) {
  md = md.replace(/\*\*([^*\n]+)\*\*\s*[-–—:]\s*/g, '**$1**\n\n');
  md = md.replace(/^####\s*([^\n]+?)\s*[-–—:]\s*/gm, '#### $1\n\n');
  md = md.replace(/^-\s*\*\*([^*]+)\*\*\s*[-–—:]\s*/gm, '- **$1**\n  ');
  md = md.replace(/\n{3,}/g, '\n\n');
  return md;
}

function raInjectWidgets(md) {
  md = md.replace(/(?:\[stat:([^|\]]+)\|([^\]]+)\]\s*)+/g, (block) => {
    const stats = [...block.matchAll(/\[stat:([^|\]]+)\|([^\]]+)\]/g)];
    return '<div class="ra-stat-grid">' + stats.map(s =>
      `<div class="ra-stat-card"><span class="ra-stat-value">${raEscapeHtml(s[1].trim())}</span><span class="ra-stat-label">${raEscapeHtml(s[2].trim())}</span></div>`
    ).join('') + '</div>\n\n';
  });
  md = md.replace(/(?:\[bar:([^|\]]+)\|(\d+)\|([^\]]+)\]\s*)+/g, (block) => {
    const bars = [...block.matchAll(/\[bar:([^|\]]+)\|(\d+)\|([^\]]+)\]/g)];
    return '<div class="ra-bar-chart">' + bars.map(b => {
      const label = raEscapeHtml(b[1].trim());
      const score = Math.min(100, Math.max(0, parseInt(b[2], 10)));
      const status = b[3].trim();
      const cls = /strong/i.test(status) ? 'strong' : /partial/i.test(status) ? 'partial' : 'gap';
      return `<div class="ra-bar-row"><div class="ra-bar-header"><span class="ra-bar-label">${label}</span><span class="ra-bar-badge ${cls}">${raEscapeHtml(status)}</span></div><div class="ra-bar-track"><div class="ra-bar-fill ${cls}" data-width="${score}"></div></div></div>`;
    }).join('') + '</div>\n\n';
  });
  return md;
}

function raParseMdBlock(md) {
  md = raFixClumping(raInjectWidgets(md));
  return (typeof marked !== 'undefined') ? marked.parse(md) : md.replace(/\n/g, '<br>');
}

function raIsActionPlan(title) {
  return /30.day|action plan/i.test(title);
}

function raBuildTimeline(body) {
  const chunks = body.split(/\n(?=####\s)/i).filter(c => c.trim());
  const weekChunks = chunks.filter(c => /^####\s*Week/i.test(c.trim()));
  if (!weekChunks.length) return raParseMdBlock(body);

  let html = '<div class="ra-timeline">';
  weekChunks.forEach(chunk => {
    const m = chunk.match(/^####\s*(.+?)\s*\n([\s\S]*)/i);
    if (m) {
      html += `<div class="ra-timeline-node"><div class="ra-timeline-badge">${raEscapeHtml(m[1].trim())}</div><div class="ra-timeline-body">${raParseMdBlock(m[2].trim())}</div></div>`;
    }
  });
  const intro = chunks.filter(c => !/^####\s*Week/i.test(c.trim())).join('\n').trim();
  if (intro) html = raParseMdBlock(intro) + html;
  html += '</div>';
  return html;
}

function raRenderAuditMarkdown(md) {
  md = raStripEmojis(md);
  const splitIdx = md.search(/\n###\s+/);
  let headerMd = '', sectionsRaw = md;
  if (splitIdx !== -1) {
    headerMd = md.slice(0, splitIdx).trim();
    sectionsRaw = md.slice(splitIdx);
  }

  let html = '<div class="ra-audit-wrap">';
  if (headerMd) {
    html += `<div class="ra-audit-header">${raParseMdBlock(headerMd)}</div>`;
  }

  const sections = sectionsRaw.split(/\n(?=###\s+)/).filter(s => s.trim());
  html += '<div class="ra-accordion-group">';
  sections.forEach(section => {
    const titleM = section.match(/^###\s+(.+?)(?:\n|$)/);
    if (!titleM) return;
    const title = titleM[1].trim();
    let body = section.replace(/^###\s+.+\n?/, '').replace(/^---+\s*$/gm, '').trim();
    const inner = raIsActionPlan(title) ? raBuildTimeline(body) : raParseMdBlock(body);
    html += `<details class="ra-accordion"><summary class="ra-accordion-summary"><span class="ra-acc-title">${raEscapeHtml(title)}</span><span class="ra-acc-icon" aria-hidden="true">＋</span></summary><div class="ra-accordion-body">${inner}</div></details>`;
  });
  html += '</div></div>';
  return html;
}

function raRenderContent(md, isAudit) {
  if (isAudit || (md.includes('\n### ') && md.split('\n### ').length > 2)) {
    return raRenderAuditMarkdown(md);
  }
  return `<div class="ra-content">${raParseMdBlock(raStripEmojis(md))}</div>`;
}

function raAnimateBars(container) {
  requestAnimationFrame(() => {
    container.querySelectorAll('.ra-bar-fill').forEach(bar => {
      setTimeout(() => { bar.style.width = (bar.dataset.width || '0') + '%'; }, 100);
    });
  });
}

/* ═══ UI HELPERS ═══ */
function raScrollToComposer() {
  requestAnimationFrame(() => {
    document.getElementById('ra-composer').scrollIntoView({ behavior:'smooth', block:'end' });
    const inp = document.getElementById('ra-inp');
    if (inp && !inp.disabled) inp.focus({ preventScroll:true });
  });
}

function raShowComposer(show) { document.getElementById('ra-composer').style.display = show ? 'block' : 'none'; }

function raUpdateProgress(n) {
  document.getElementById('ra-progress-wrap').style.display = 'block';
  const pct = Math.round((n / TOTAL_QUIZ) * 100);
  document.getElementById('ra-progress-label').textContent = `Question ${n} of ${TOTAL_QUIZ}`;
  document.getElementById('ra-progress-pct').textContent = pct + '%';
  document.getElementById('ra-progress-fill').style.width = pct + '%';
}

function raHideProgress() { document.getElementById('ra-progress-wrap').style.display = 'none'; }

function raShowHalfway(cb) {
  document.getElementById('ra-choices').style.display = 'none';
  document.getElementById('ra-quiz-actions').style.display = 'none';
  const msg = document.getElementById('ra-halfway-msg');
  msg.style.display = 'block';
  setTimeout(() => { msg.style.display = 'none'; if (cb) cb(); }, 1800);
}

function raShowAnalysisProgress() {
  raHideProgress();
  document.getElementById('ra-main-title').textContent = `Analyzing ${raState.brand.name}...`;
  document.getElementById('ra-analysis-progress').style.display = 'block';
  ['ra-step-1','ra-step-2','ra-step-3'].forEach((id, i) => {
    setTimeout(() => {
      if (i > 0) document.getElementById(['ra-step-1','ra-step-2','ra-step-3'][i-1]).className = 'ra-analysis-step done';
      document.getElementById(id).className = 'ra-analysis-step active';
    }, i * 1200);
  });
}

function raHideAnalysisProgress() {
  document.getElementById('ra-analysis-progress').style.display = 'none';
  ['ra-step-1','ra-step-2','ra-step-3'].forEach(id => { document.getElementById(id).className = 'ra-analysis-step'; });
}

function raUpdateFollowUpCounter() {
  const el = document.getElementById('ra-followup-counter');
  if (raState.phase !== 'chat' || raState.sessionEnded) { el.style.display = 'none'; return; }
  const rem = MAX_FOLLOWUPS - raState.followUpCount;
  el.style.display = 'block';
  el.textContent = rem > 0 ? `${rem} follow-up question${rem === 1 ? '' : 's'} remaining` : 'Session limit reached';
}

function raShowInput(placeholder, mode) {
  document.getElementById('ra-choices').style.display = 'none';
  document.getElementById('ra-quiz-actions').style.display = 'none';
  raShowComposer(true);
  const inp = document.getElementById('ra-inp'), btn = document.getElementById('ra-send');
  inp.placeholder = placeholder; inp.dataset.mode = mode; inp.value = '';
  inp.disabled = raState.sessionEnded; btn.disabled = raState.sessionEnded;
  btn.textContent = mode === 'followup' ? 'Ask' : 'Continue';
  raUpdateFollowUpCounter();
  if (!raState.sessionEnded) setTimeout(() => inp.focus({ preventScroll:true }), 100);
}

function raRenderBrandSummary() {
  const pane = document.getElementById('ra-display-pane');
  let el = document.getElementById('ra-summary');
  if (!el) {
    el = document.createElement('div');
    el.id = 'ra-summary';
    el.className = 'ra-m bot ra-summary';
    pane.insertBefore(el, pane.firstChild);
  }
  const rows = BRAND_SUMMARY_FIELDS.map(f => ({ label:f.label, value:f.get() })).filter(f => f.value);
  if (!rows.length) return;
  el.innerHTML = '<div class="ra-summary-title">Your brand</div>' +
    rows.map(r => `<div class="ra-summary-row"><span class="ra-summary-label">${r.label}</span><span class="ra-summary-value">${raEscapeHtml(r.value)}</span></div>`).join('');
}

/* ═══ PHASE 1: BRAND ONBOARDING ═══ */
function raSend() {
  const inp = document.getElementById('ra-inp');
  const val = inp.value.trim();
  if (!val || raState.sessionEnded) return;
  if (inp.dataset.mode === 'followup') { inp.value = ''; raSendFollowUp(val); return; }
  raHandleBrandInput(inp.dataset.mode, val);
  inp.value = '';
}

function raShowChoices(options, onPick) {
  raShowComposer(false);
  const el = document.getElementById('ra-choices');
  el.style.display = 'flex';
  el._onPick = onPick;
  el.innerHTML = options.map((opt, i) => `<button type="button" class="ra-opt" onclick="raPickChoice(${i})">${raEscapeHtml(opt)}</button>`).join('');
}

function raPickChoice(i) {
  const el = document.getElementById('ra-choices');
  const text = el.querySelectorAll('.ra-opt')[i].textContent;
  el.innerHTML = ''; el.style.display = 'none';
  if (el._onPick) el._onPick(i, text);
}

function raHandleBrandInput(mode, val) {
  if (mode === 'name') {
    raState.brand.name = val;
    raRenderBrandSummary();
    document.getElementById('ra-main-title').textContent = "Select your store's category";
    raShowChoices(CATEGORIES, (i, text) => {
      raState.brand.category = text;
      raRenderBrandSummary();
      document.getElementById('ra-main-title').textContent = "What is your store's domain URL?";
      raShowInput('https://yourbrand.com', 'url');
      raScrollToComposer();
    });
  } else if (mode === 'url') {
    raState.brand.url = val.startsWith('http') ? val : 'https://' + val;
    raRenderBrandSummary();
    raStartQuiz();
  }
}

/* ═══ PHASE 2: 10-QUESTION QUIZ ═══ */
function raStartQuiz() {
  raState.phase = 'quiz';
  raState.answers = {};
  raState.quizStep = 0;
  raShowComposer(false);
  document.getElementById('ra-main-title').textContent = '';

  raUpdateProgress(1);
  setTimeout(() => raAskQuiz(0), 500);
}

function raAskQuiz(step) {
  const q = QUIZ[step];
  raState.quizStep = step;
  raUpdateProgress(step + 1);
  document.getElementById('ra-main-title').textContent = q.q;
  q.multi ? raShowMultiChoices(q) : raShowSingleChoices(q);
}

function raShowSingleChoices(q) {
  document.getElementById('ra-quiz-actions').style.display = 'none';
  const el = document.getElementById('ra-choices');
  el.style.display = 'flex';
  el.innerHTML = q.opts.map((opt, i) => `<button type="button" class="ra-opt" onclick="raPickSingle(${i})">${raEscapeHtml(opt)}</button>`).join('');
  el._q = q;
}

function raPickSingle(i) {
  const el = document.getElementById('ra-choices'), q = el._q;
  raState.answers[q.key] = q.opts[i];
  el.innerHTML = ''; el.style.display = 'none';
  raAfterQuizAnswer();
}

function raShowMultiChoices(q) {
  raState.multiSelected = new Set();
  const el = document.getElementById('ra-choices');
  el.style.display = 'flex';
  el.innerHTML = '<div class="ra-multi-hint">Select all that apply</div>' +
    q.opts.map((opt, i) => `<div class="ra-opt ra-multi" data-idx="${i}" onclick="raToggleMulti(${i})"><span class="ra-check"></span><span>${raEscapeHtml(opt)}</span></div>`).join('');
  el._q = q;
  document.getElementById('ra-quiz-actions').style.display = 'block';
  document.getElementById('ra-continue-btn').disabled = true;
}

function raToggleMulti(i) {
  const optEl = document.querySelector(`#ra-choices [data-idx="${i}"]`);
  if (raState.multiSelected.has(i)) { raState.multiSelected.delete(i); optEl.classList.remove('selected'); }
  else { raState.multiSelected.add(i); optEl.classList.add('selected'); }
  document.getElementById('ra-continue-btn').disabled = raState.multiSelected.size === 0;
}

function raSubmitMulti() {
  const el = document.getElementById('ra-choices'), q = el._q;
  if (!q || !raState.multiSelected.size) return;
  raState.answers[q.key] = [...raState.multiSelected].sort((a,b) => a-b).map(i => q.opts[i]);
  el.innerHTML = ''; el.style.display = 'none';
  document.getElementById('ra-quiz-actions').style.display = 'none';
  raAfterQuizAnswer();
}

function raAfterQuizAnswer() {
  const step = raState.quizStep;
  if (step === 4) { raShowHalfway(() => raAskQuiz(5)); return; }
  if (step === TOTAL_QUIZ - 1) { raHideProgress(); raGenerate(); return; }
  raAskQuiz(step + 1);
}

/* ═══ AUDIT GENERATION ═══ */
async function raGenerate() {
  raShowAnalysisProgress();
  const dots = raTyping();
  try {
    const res = await fetch(RA_API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ brandInfo:raState.brand, quizAnswers:raState.answers })
    });
    raRemoveDots(dots);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    raHideAnalysisProgress();
    raState.audit = data.audit;
    raState.phase = 'chat';
    raAudit(data.audit);
    document.getElementById('ra-cta').style.display = 'block';
    document.getElementById('ra-main-title').textContent = 'Ask a follow-up question';
    raShowInput('Ask about your retention strategy...', 'followup');
    raShowSuggestions();
    raScrollToComposer();
  } catch (err) {
    raRemoveDots(dots);
    raHideAnalysisProgress();
    raBot('<p>Something went wrong — please try running your audit again in a moment.</p>');
    console.error('[RA Error]', err);
  }
}

/* ═══ FOLLOW-UP CHAT (max 5) ═══ */
function getWeakAreas() {
  return QUIZ.map(q => {
    const ans = raState.answers[q.key];
    let isWeak = false;
    if (q.multi && Array.isArray(ans)) isWeak = ans.some(a => q.weak.includes(q.opts.indexOf(a))) || !ans.length;
    else isWeak = q.weak.includes(q.opts.indexOf(ans));
    return { key:q.key, isWeak };
  }).filter(a => a.isWeak);
}

function raBuildSuggestionPool() {
  const asked = new Set(raState.chatHistory.map(h => h.user.toLowerCase().trim()));
  const keys = [...new Set([...getWeakAreas().map(w => w.key), ...QUIZ.map(q => q.key)])];
  const pool = [];
  keys.forEach(k => (SUGGESTED_BY_AREA[k] || []).forEach(q => { if (!pool.includes(q) && !asked.has(q.toLowerCase())) pool.push(q); }));
  return pool;
}

function raShowSuggestions() {
  if (raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS || raState.phase !== 'chat') return;
  const pool = raBuildSuggestionPool();
  const picked = [];
  for (let i = 0; i < pool.length && picked.length < 3; i++) {
    const q = pool[(raState.followUpCount + i) % pool.length];
    if (!picked.includes(q)) picked.push(q);
  }
  const el = document.getElementById('ra-suggestions');
  if (!picked.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = '<div id="ra-suggestions-label">Suggested questions</div>' +
    picked.map((q, i) => `<button type="button" class="ra-suggest" onclick="raAskSuggested(${i})">${raEscapeHtml(q)}</button>`).join('');
  el._questions = picked;
  raScrollToComposer();
}

function raAskSuggested(i) {
  const q = document.getElementById('ra-suggestions')._questions[i];
  if (!q || raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS) return;
  document.getElementById('ra-suggestions').style.display = 'none';
  raSendFollowUp(q);
}

async function raSendFollowUp(message) {
  if (raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS) { raShowSessionEnd(); return; }
  document.getElementById('ra-suggestions').style.display = 'none';
  raUser(message);
  raState.followUpCount++;
  raUpdateFollowUpCounter();
  raShowComposer(false);
  const dots = raTyping();
  try {
    const res = await fetch(RA_FOLLOWUP_API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ brandInfo:raState.brand, quizAnswers:raState.answers, audit:raState.audit, message, history:raState.chatHistory })
    });
    raRemoveDots(dots);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    raState.chatHistory.push({ user:message, assistant:data.reply });
    raBotMarkdown(data.reply, false);
    if (raState.followUpCount >= MAX_FOLLOWUPS) raShowSessionEnd();
    else { raShowInput('Ask another question...', 'followup'); raShowSuggestions(); raScrollToComposer(); }
  } catch (err) {
    raRemoveDots(dots);
    raBot('<p>Something went wrong — please try your question again.</p>');
    raShowInput('Ask about your retention strategy...', 'followup');
    raShowSuggestions();
    console.error('[RA Follow-up Error]', err);
  }
}

function raShowSessionEnd() {
  raState.sessionEnded = true;
  document.getElementById('ra-suggestions').style.display = 'none';
  raShowComposer(false);
  raUpdateFollowUpCounter();
  const el = document.createElement('div');
  el.className = 'ra-m bot ra-session-end';
  el.innerHTML = '<p><strong>Session complete.</strong> You\'ve explored 5 follow-up questions.</p><p>Book a demo or request a callback — Superfans experts will get in touch with you.</p><a href="https://www.superfans.io/demo" target="_blank" rel="noopener">Book a Demo / Request a Callback</a>';
  document.getElementById('ra-display-pane').appendChild(el);
  document.getElementById('ra-cta').style.display = 'block';
}

/* ═══ MESSAGE RENDERING ═══ */
function raBot(html) {
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = html;
  document.getElementById('ra-display-pane').appendChild(el);
  return el;
}

function raBotMarkdown(md, isAudit) {
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = raRenderContent(md, isAudit);
  document.getElementById('ra-display-pane').appendChild(el);
  raAnimateBars(el);
  return el;
}

function raUser(text) {
  const el = document.createElement('div');
  el.className = 'ra-m usr';
  el.textContent = text;
  document.getElementById('ra-display-pane').appendChild(el);
}

function raAudit(md) {
  const el = document.createElement('div');
  el.className = 'ra-m bot ra-audit';
  el.innerHTML = raRenderContent(md, true);
  document.getElementById('ra-display-pane').appendChild(el);
  raAnimateBars(el);
}

function raTyping() {
  const el = document.createElement('div');
  el.className = 'ra-dots';
  el.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('ra-display-pane').appendChild(el);
  return el;
}

function raRemoveDots(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

function raRestart() {
  raState = { brand:{}, answers:{}, quizStep:0, audit:null, followUpCount:0, chatHistory:[], sessionEnded:false, phase:'brand', multiSelected:new Set() };
  document.getElementById('ra-main-title').textContent = 'What brand are we auditing today?';
  document.getElementById('ra-display-pane').innerHTML = '';
  document.getElementById('ra-choices').innerHTML = '';
  document.getElementById('ra-choices').style.display = 'none';
  document.getElementById('ra-quiz-actions').style.display = 'none';
  document.getElementById('ra-halfway-msg').style.display = 'none';
  document.getElementById('ra-progress-wrap').style.display = 'none';
  document.getElementById('ra-progress-fill').style.width = '0';
  raHideAnalysisProgress();
  document.getElementById('ra-suggestions').innerHTML = '<div id="ra-suggestions-label">Suggested questions</div>';
  document.getElementById('ra-suggestions').style.display = 'none';
  document.getElementById('ra-cta').style.display = 'none';
  document.getElementById('ra-send').disabled = false;
  raShowInput('Enter your brand name...', 'name');
  raScrollToComposer();
}
</script>
