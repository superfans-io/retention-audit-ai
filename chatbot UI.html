function raStripEmojis(text) {
  return text
    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '')
    .replace(/🔴|🟡|🟢|🎯|📊|🏥|⚡|📋|🛠|💬/g, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}

function raPreprocessMarkdown(md) {
  md = raStripEmojis(md);

  md = md.replace(/(?:\[stat:([^|\]]+)\|([^\]]+)\]\s*)+/g, (block) => {
    const stats = [...block.matchAll(/\[stat:([^|\]]+)\|([^\]]+)\]/g)];
    return '<div class="ra-stat-grid">' + stats.map(s =>
      `<div class="ra-stat-card"><span class="ra-stat-value">${s[1].trim()}</span><span class="ra-stat-label">${s[2].trim()}</span></div>`
    ).join('') + '</div>\n\n';
  });

  md = md.replace(/(?:\[bar:([^|\]]+)\|(\d+)\|([^\]]+)\]\s*)+/g, (block) => {
    const bars = [...block.matchAll(/\[bar:([^|\]]+)\|(\d+)\|([^\]]+)\]/g)];
    return '<div class="ra-bar-chart">' + bars.map(b => {
      const label = b[1].trim();
      const score = Math.min(100, Math.max(0, parseInt(b[2], 10)));
      const status = b[3].trim();
      const cls = status.toLowerCase().includes('strong') ? 'strong'
        : status.toLowerCase().includes('partial') ? 'partial' : 'gap';
      return `<div class="ra-bar-row">
        <div class="ra-bar-header"><span class="ra-bar-label">${label}</span><span class="ra-bar-badge ${cls}">${status}</span></div>
        <div class="ra-bar-track"><div class="ra-bar-fill ${cls}" data-width="${score}"></div></div>
      </div>`;
    }).join('') + '</div>\n\n';
  });

  return (typeof marked !== 'undefined') ? marked.parse(md) : md.replace(/\n/g, '<br>');
}

function raAnimateBars(container) {
  requestAnimationFrame(() => {
    container.querySelectorAll('.ra-bar-fill').forEach(bar => {
      const w = bar.dataset.width || '0';
      setTimeout(() => { bar.style.width = w + '%'; }, 80);
    });
  });
}

function raScrollToComposer() {
  requestAnimationFrame(() => {
    const composer = document.getElementById('ra-composer');
    composer.scrollIntoView({ behavior: 'smooth', block: 'end' });
    const inp = document.getElementById('ra-inp');
    if (inp && !inp.disabled) inp.focus({ preventScroll: true });
  });
}

function raShowComposer(show) {
  document.getElementById('ra-composer').style.display = show ? 'block' : 'none';
}

function raUpdateFollowUpCounter() {
  const el = document.getElementById('ra-followup-counter');
  if (raState.phase !== 'chat' || raState.sessionEnded) {
    el.style.display = 'none';
    return;
  }
  const remaining = MAX_FOLLOWUPS - raState.followUpCount;
  el.style.display = 'block';
  el.textContent = remaining > 0
    ? `${remaining} follow-up question${remaining === 1 ? '' : 's'} remaining`
    : 'Session limit reached';
}

function raShowInput(placeholder, mode) {
  document.getElementById('ra-choices').style.display = 'none';
  raShowComposer(true);
  const inp = document.getElementById('ra-inp');
  const btn = document.getElementById('ra-send');
  inp.placeholder = placeholder;
  inp.dataset.mode = mode;
  inp.value = '';
  inp.disabled = raState.sessionEnded;
  btn.disabled = raState.sessionEnded;
  btn.textContent = mode === 'followup' ? 'Ask' : 'Run Audit';
  raUpdateFollowUpCounter();
  if (!raState.sessionEnded) setTimeout(() => inp.focus({ preventScroll: true }), 100);
}

function raShowChoices(options, onPick) {
  raShowComposer(false);
  const el = document.getElementById('ra-choices');
  el.style.display = 'flex';
  el._onPick = onPick;
  el.innerHTML = options.map((opt, i) =>
    `<button class="ra-opt" onclick="raPick(${i})">${opt}</button>`
  ).join('');
}

function raPick(i) {
  const el = document.getElementById('ra-choices');
  const text = el.querySelectorAll('.ra-opt')[i].textContent;
  el.innerHTML = '';
  el.style.display = 'none';
  if (el._onPick) el._onPick(i, text);
}

function raSend() {
  const inp = document.getElementById('ra-inp');
  const val = inp.value.trim();
  if (!val || raState.sessionEnded) return;
  if (inp.dataset.mode === 'followup') {
    inp.value = '';
    raSendFollowUp(val);
    return;
  }
  raHandleText(inp.dataset.mode, val);
  inp.value = '';
}

function raHandleText(mode, val) {
  if (mode === 'name') {
    raState.brand.name = val;
    raRenderSummary();
    document.getElementById('ra-main-title').textContent = "Select your store's vertical";
    raShowChoices(CATEGORIES, (i, text) => {
      raState.brand.category = text;
      raRenderSummary();
      document.getElementById('ra-main-title').textContent = "What is your store's domain URL?";
      raShowInput('https://yourbrand.com', 'url');
      raScrollToComposer();
    });
  } else if (mode === 'url') {
    raState.brand.url = val.startsWith('http') ? val : 'https://' + val;
    raState.quizStep = 0;
    raState.answers = {};
    raRenderSummary();
    raAskQuiz(0);
  }
}

function raAskQuiz(step) {
  const q = QUIZ[step];
  document.getElementById('ra-main-title').textContent = q.q;
  raShowChoices(q.opts, (i, text) => {
    raState.answers[q.key] = text;
    raRenderSummary();
    raState.quizStep++;
    if (raState.quizStep < QUIZ.length) raAskQuiz(raState.quizStep);
    else raGenerate();
  });
}

function raRenderSummary() {
  const pane = document.getElementById('ra-display-pane');
  let el = document.getElementById('ra-summary');
  if (!el) {
    el = document.createElement('div');
    el.id = 'ra-summary';
    el.className = 'ra-m bot ra-summary';
    pane.insertBefore(el, pane.firstChild);
  }
  const rows = SUMMARY_FIELDS.map(f => ({ label: f.label, value: f.get() })).filter(f => f.value);
  if (!rows.length) return;
  el.innerHTML = '<div class="ra-summary-title">Your responses</div>' +
    rows.map(r => `<div class="ra-summary-row">
      <span class="ra-summary-label">${r.label}</span>
      <span class="ra-summary-value">${r.value}</span>
    </div>`).join('');
}

function getWeakAreas() {
  return QUIZ.map(q => {
    const optIdx = q.opts.indexOf(raState.answers[q.key]);
    return { key: q.key, isWeak: q.weak.includes(optIdx), severity: q.weak.includes(optIdx) ? (4 - optIdx) : 0 };
  }).filter(a => a.isWeak).sort((a, b) => b.severity - a.severity);
}

function raBuildSuggestionPool() {
  const asked = new Set(raState.chatHistory.map(h => h.user.toLowerCase().trim()));
  const weakKeys = getWeakAreas().map(w => w.key);
  const keyOrder = [...new Set([...weakKeys, ...QUIZ.map(q => q.key)])];
  const pool = [];
  keyOrder.forEach(key => {
    (SUGGESTED_BY_AREA[key] || []).forEach(q => {
      if (!pool.includes(q) && !asked.has(q.toLowerCase().trim())) pool.push(q);
    });
  });
  Object.values(SUGGESTED_BY_AREA).flat().forEach(q => {
    if (!pool.includes(q) && !asked.has(q.toLowerCase().trim())) pool.push(q);
  });
  return pool;
}

function raShowSuggestions() {
  if (raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS || raState.phase !== 'chat') return;

  const pool = raBuildSuggestionPool();
  const offset = raState.followUpCount;
  const picked = [];
  for (let i = 0; i < pool.length && picked.length < 3; i++) {
    const q = pool[(offset + i) % pool.length];
    if (!picked.includes(q)) picked.push(q);
  }

  const el = document.getElementById('ra-suggestions');
  if (!picked.length) { el.style.display = 'none'; return; }

  el.style.display = 'flex';
  el.innerHTML = '<div id="ra-suggestions-label">Suggested questions</div>' +
    picked.map((q, i) => `<button class="ra-suggest" onclick="raAskSuggested(${i})">${q}</button>`).join('');
  el._questions = picked;
  raScrollToComposer();
}

function raAskSuggested(i) {
  const q = document.getElementById('ra-suggestions')._questions[i];
  if (!q || raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS) return;
  document.getElementById('ra-suggestions').style.display = 'none';
  raSendFollowUp(q);
}

async function raGenerate() {
  document.getElementById('ra-main-title').textContent = `Analyzing ${raState.brand.name}...`;
  raShowComposer(false);
  const dots = raTyping();

  try {
    const res = await fetch(RA_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brandInfo: raState.brand, quizAnswers: raState.answers })
    });
    raRemoveDots(dots);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    raState.audit = data.audit;
    raState.phase = 'chat';
    raAudit(data.audit);
    document.getElementById('ra-cta').style.display = 'block';
    document.getElementById('ra-main-title').textContent = 'Ask a follow-up question';
    raShowInput('Ask about your retention strategy...', 'followup');
    raShowSuggestions();
    raScrollToComposer();
  } catch (err) {
    raRemoveDots(dots);
    raBot('Something went wrong — please try running your audit again in a moment.');
    raShowInput('Enter your brand name...', 'name');
    console.error('[RA Error]', err);
  }
}

async function raSendFollowUp(message) {
  if (raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS) {
    raShowSessionEnd();
    return;
  }

  document.getElementById('ra-suggestions').style.display = 'none';
  raUser(message);
  raState.followUpCount++;
  raUpdateFollowUpCounter();
  raShowComposer(false);
  const dots = raTyping();

  try {
    const res = await fetch(RA_FOLLOWUP_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brandInfo: raState.brand,
        quizAnswers: raState.answers,
        audit: raState.audit,
        message,
        history: raState.chatHistory
      })
    });
    raRemoveDots(dots);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    raState.chatHistory.push({ user: message, assistant: data.reply });
    raBotMarkdown(data.reply);

    if (raState.followUpCount >= MAX_FOLLOWUPS) {
      raShowSessionEnd();
    } else {
      raShowInput('Ask another question...', 'followup');
      raShowSuggestions();
      raScrollToComposer();
    }
  } catch (err) {
    raRemoveDots(dots);
    raBot('Something went wrong — please try your question again in a moment.');
    raShowInput('Ask about your retention strategy...', 'followup');
    raShowSuggestions();
    console.error('[RA Follow-up Error]', err);
  }
}

function raShowSessionEnd() {
  raState.sessionEnded = true;
  document.getElementById('ra-suggestions').style.display = 'none';
  raShowComposer(false);
  raUpdateFollowUpCounter();

  const el = document.createElement('div');
  el.className = 'ra-m bot ra-session-end';
  el.innerHTML =
    '<p><strong>Session complete.</strong> You\'ve explored 5 follow-up questions — strong depth for a first session.</p>' +
    '<p>To go further, book a demo or request a callback. Superfans experts will get in touch with you personally.</p>' +
    '<a href="https://www.superfans.io/demo" target="_blank" rel="noopener" style="display:inline-block;background:linear-gradient(135deg,#915EE9,#7B4FD4);color:#FAF6FF;padding:14px 28px;border-radius:14px;font-size:14px;font-weight:700;text-decoration:none;">Book a Demo / Request a Callback</a>';
  document.getElementById('ra-display-pane').appendChild(el);
  document.getElementById('ra-cta').style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function raRenderBotContent(markdown) {
  const html = raPreprocessMarkdown(markdown);
  return `<div class="ra-content">${html}</div>`;
}

function raBot(html) {
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = html;
  document.getElementById('ra-display-pane').appendChild(el);
  return el;
}

function raBotMarkdown(markdown) {
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = raRenderBotContent(markdown);
  document.getElementById('ra-display-pane').appendChild(el);
  raAnimateBars(el);
  return el;
}

function raUser(text) {
  const el = document.createElement('div');
  el.className = 'ra-m usr';
  el.textContent = text;
  document.getElementById('ra-display-pane').appendChild(el);
}

function raAudit(markdown) {
  const el = document.createElement('div');
  el.className = 'ra-m bot ra-audit';
  el.innerHTML = raRenderBotContent(markdown);
  document.getElementById('ra-display-pane').appendChild(el);
  raAnimateBars(el);
}

function raTyping() {
  const el = document.createElement('div');
  el.className = 'ra-dots';
  el.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('ra-display-pane').appendChild(el);
  return el;
}

function raRemoveDots(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

function raRestart() {
  raState = { brand: {}, answers: {}, quizStep: 0, audit: null, followUpCount: 0, chatHistory: [], sessionEnded: false, phase: 'wizard' };
  document.getElementById('ra-main-title').style.display = 'block';
  document.getElementById('ra-main-title').textContent = 'What brand are we auditing today?';
  document.getElementById('ra-display-pane').innerHTML = '';
  document.getElementById('ra-choices').innerHTML = '';
  document.getElementById('ra-choices').style.display = 'none';
  document.getElementById('ra-suggestions').innerHTML = '<div id="ra-suggestions-label">Suggested questions</div>';
  document.getElementById('ra-suggestions').style.display = 'none';
  document.getElementById('ra-cta').style.display = 'none';
  document.getElementById('ra-send').disabled = false;
  raShowInput('Enter your brand name...', 'name');
  raScrollToComposer();
}
</script>
