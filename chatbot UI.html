const QUIZ = [
  {
    key: 'q1', multi: false,
    q: 'How often does a typical customer buy from you?',
    opts: ['Once (gift / one-time purchase)','Every 1–2 months','Every 3–6 months','Once or twice a year','High-frequency (weekly / monthly consumable)','Irregular / event-driven'],

  {

    q: 'What is your current repeat purchase rate (roughly)?',
    opts: ['Less than 10%','10–20%','20–35%','35–50%','Above 50%','Don\'t know'],

  {
    key: 'q3', multi: true,
    q: 'How do you currently identify your best customers?',
    opts: ['We don\'t have a system for this','Total lifetime spend','RFM score (Recency, Frequency & Monetary)','Order count threshold','Annual revenue contribution','Manual tagging by the team','App or loyalty program membership'],

function raStripEmojis(text) {
  return text.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').replace(/\s{2,}/g, ' ').trim();
}

function raPreprocessMarkdown(md) {
  md = raStripEmojis(md);
  md = md.replace(/(?:\[stat:([^|\]]+)\|([^\]]+)\]\s*)+/g, (block) => {
    const stats = [...block.matchAll(/\[stat:([^|\]]+)\|([^\]]+)\]/g)];
    return '<div class="ra-stat-grid">' + stats.map(s =>
      `<div class="ra-stat-card"><span class="ra-stat-value">${s[1].trim()}</span><span class="ra-stat-label">${s[2].trim()}</span></div>`
    ).join('') + '</div>\n\n';
  });
  md = md.replace(/(?:\[bar:([^|\]]+)\|(\d+)\|([^\]]+)\]\s*)+/g, (block) => {
    const bars = [...block.matchAll(/\[bar:([^|\]]+)\|(\d+)\|([^\]]+)\]/g)];
    return '<div class="ra-bar-chart">' + bars.map(b => {
      const label = b[1].trim(), score = Math.min(100, Math.max(0, parseInt(b[2], 10))), status = b[3].trim();
      const cls = status.toLowerCase().includes('strong') ? 'strong' : status.toLowerCase().includes('partial') ? 'partial' : 'gap';
      return `<div class="ra-bar-row"><div class="ra-bar-header"><span class="ra-bar-label">${label}</span><span class="ra-bar-badge ${cls}">${status}</span></div><div class="ra-bar-track"><div class="ra-bar-fill ${cls}" data-width="${score}"></div></div></div>`;
    }).join('') + '</div>\n\n';
  });
  return (typeof marked !== 'undefined') ? marked.parse(md) : md.replace(/\n/g, '<br>');
}

function raAnimateBars(container) {
  requestAnimationFrame(() => {
    container.querySelectorAll('.ra-bar-fill').forEach(bar => {
      setTimeout(() => { bar.style.width = (bar.dataset.width || '0') + '%'; }, 80);
    });
  });
}

function raRenderBotContent(md) { return `<div class="ra-content">${raPreprocessMarkdown(md)}</div>`; }

/* ── UI helpers ─────────────────────────────────────────── */
function raScrollToComposer() {
  requestAnimationFrame(() => {
    document.getElementById('ra-composer').scrollIntoView({ behavior: 'smooth', block: 'end' });
    const inp = document.getElementById('ra-inp');
    if (inp && !inp.disabled) inp.focus({ preventScroll: true });
  });
}

function raShowComposer(show) {
  document.getElementById('ra-composer').style.display = show ? 'block' : 'none';
}

function raUpdateProgress(n) {
  const wrap = document.getElementById('ra-progress-wrap');
  wrap.style.display = 'block';
  const pct = Math.round((n / TOTAL_QUIZ) * 100);
  document.getElementById('ra-progress-label').textContent = `Question ${n} of ${TOTAL_QUIZ}`;
  document.getElementById('ra-progress-pct').textContent = pct + '%';
  document.getElementById('ra-progress-fill').style.width = pct + '%';
}

function raHideProgress() {
  document.getElementById('ra-progress-wrap').style.display = 'none';
}

function raShowHalfway(cb) {
  document.getElementById('ra-choices').style.display = 'none';
  document.getElementById('ra-quiz-actions').style.display = 'none';
  const msg = document.getElementById('ra-halfway-msg');
  msg.style.display = 'block';
  setTimeout(() => {
    msg.style.display = 'none';
    if (cb) cb();
  }, 1800);
}

function raShowAnalysisProgress() {
  raHideProgress();
  document.getElementById('ra-main-title').textContent = `Analyzing ${raState.brand.name}...`;
  const el = document.getElementById('ra-analysis-progress');
  el.style.display = 'block';
  ['ra-step-1','ra-step-2','ra-step-3'].forEach((id, i) => {
    setTimeout(() => {
      if (i > 0) document.getElementById(['ra-step-1','ra-step-2','ra-step-3'][i-1]).className = 'ra-analysis-step done';
      document.getElementById(id).className = 'ra-analysis-step active';
    }, i * 1200);
  });
}

function raHideAnalysisProgress() {
  document.getElementById('ra-analysis-progress').style.display = 'none';
  ['ra-step-1','ra-step-2','ra-step-3'].forEach(id => {
    document.getElementById(id).className = 'ra-analysis-step';
  });
}

function raUpdateFollowUpCounter() {
  const el = document.getElementById('ra-followup-counter');
  if (raState.phase !== 'chat' || raState.sessionEnded) { el.style.display = 'none'; return; }
  const rem = MAX_FOLLOWUPS - raState.followUpCount;
  el.style.display = 'block';
  el.textContent = rem > 0 ? `${rem} follow-up question${rem === 1 ? '' : 's'} remaining` : 'Session limit reached';
}

function raShowInput(placeholder, mode) {
  document.getElementById('ra-choices').style.display = 'none';
  document.getElementById('ra-quiz-actions').style.display = 'none';
  raShowComposer(true);
  const inp = document.getElementById('ra-inp');
  const btn = document.getElementById('ra-send');
  inp.placeholder = placeholder;
  inp.dataset.mode = mode;
  inp.value = '';
  inp.disabled = raState.sessionEnded;
  btn.disabled = raState.sessionEnded;
  btn.textContent = mode === 'followup' ? 'Ask' : 'Continue';
  raUpdateFollowUpCounter();
  if (!raState.sessionEnded) setTimeout(() => inp.focus({ preventScroll: true }), 100);
}

/* ── Brand summary (persistent) ─────────────────────────── */
function raRenderBrandSummary() {
  const pane = document.getElementById('ra-display-pane');
  let el = document.getElementById('ra-summary');
  if (!el) {
    el = document.createElement('div');
    el.id = 'ra-summary';
    el.className = 'ra-m bot ra-summary';
    pane.insertBefore(el, pane.firstChild);
  }
  const rows = BRAND_SUMMARY_FIELDS.map(f => ({ label: f.label, value: f.get() })).filter(f => f.value);
  if (!rows.length) return;
  el.innerHTML = '<div class="ra-summary-title">Your brand</div>' +
    rows.map(r => `<div class="ra-summary-row"><span class="ra-summary-label">${r.label}</span><span class="ra-summary-value">${r.value}</span></div>`).join('');
}

/* ── Phase 1: Brand info ────────────────────────────────── */
function raSend() {
  const inp = document.getElementById('ra-inp');
  const val = inp.value.trim();
  if (!val || raState.sessionEnded) return;
  if (inp.dataset.mode === 'followup') { inp.value = ''; raSendFollowUp(val); return; }
  raHandleBrandInput(inp.dataset.mode, val);
  inp.value = '';
}

function raHandleBrandInput(mode, val) {
  if (mode === 'name') {
    raState.brand.name = val;
    raRenderBrandSummary();
    document.getElementById('ra-main-title').textContent = "Select your store's category";
    raShowChoices(CATEGORIES, (i, text) => {
      raState.brand.category = text;
      raRenderBrandSummary();
      document.getElementById('ra-main-title').textContent = "What is your store's domain URL?";
      raShowInput('https://yourbrand.com', 'url');
      raScrollToComposer();
    });
  } else if (mode === 'url') {
    raState.brand.url = val.startsWith('http') ? val : 'https://' + val;
    raRenderBrandSummary();
    raStartQuiz();
  }
}

/* ── Phase 2: 10-question quiz ─────────────────────────── */
function raStartQuiz() {
  raState.phase = 'quiz';
  raState.answers = {};
  raState.quizStep = 0;
  raShowComposer(false);
  document.getElementById('ra-main-title').textContent = '';

  let intro = document.getElementById('ra-quiz-intro');
  if (!intro) {
    intro = document.createElement('div');
    intro.id = 'ra-quiz-intro';
    intro.className = 'ra-m bot';
    const summary = document.getElementById('ra-summary');
    if (summary && summary.nextSibling) {
      document.getElementById('ra-display-pane').insertBefore(intro, summary.nextSibling);
    } else {
      document.getElementById('ra-display-pane').appendChild(intro);
    }
  }
  intro.innerHTML = '<p style="margin:0;font-size:16px;color:#FAF6FF;line-height:1.6;">Tell us a little about your brand <span style="color:rgba(238,224,254,0.6);font-size:14px;">(It\'ll only take a minute, we promise!)</span></p>';

  raUpdateProgress(1);
  setTimeout(() => raAskQuiz(0), 500);
}

function raAskQuiz(step) {
  const q = QUIZ[step];
  raState.quizStep = step;
  raUpdateProgress(step + 1);
  document.getElementById('ra-main-title').textContent = q.q;

  if (q.multi) raShowMultiChoices(q);
  else raShowSingleChoices(q);
}

function raShowSingleChoices(q) {
  document.getElementById('ra-quiz-actions').style.display = 'none';
  const el = document.getElementById('ra-choices');
  el.style.display = 'flex';
  el.innerHTML = q.opts.map((opt, i) =>
    `<button class="ra-opt" onclick="raPickSingle(${i})">${opt}</button>`
  ).join('');
  el._q = q;
}

function raPickSingle(i) {
  const el = document.getElementById('ra-choices');
  const q = el._q;
  const text = q.opts[i];
  el.innerHTML = '';
  el.style.display = 'none';
  raState.answers[q.key] = text;
  raAfterQuizAnswer(q.key);
}

function raShowMultiChoices(q) {
  raState.multiSelected = new Set();
  const el = document.getElementById('ra-choices');
  el.style.display = 'flex';
  el.innerHTML = '<div class="ra-multi-hint">Select all that apply</div>' +
    q.opts.map((opt, i) =>
      `<div class="ra-opt ra-multi" data-idx="${i}" onclick="raToggleMulti(${i})">
        <span class="ra-check"></span><span>${opt}</span>
      </div>`
    ).join('');
  el._q = q;
  document.getElementById('ra-quiz-actions').style.display = 'block';
  document.getElementById('ra-continue-btn').disabled = true;
}

function raToggleMulti(i) {
  const el = document.getElementById('ra-choices');
  const optEl = el.querySelector(`[data-idx="${i}"]`);
  if (raState.multiSelected.has(i)) {
    raState.multiSelected.delete(i);
    optEl.classList.remove('selected');
  } else {
    raState.multiSelected.add(i);
    optEl.classList.add('selected');
  }
  document.getElementById('ra-continue-btn').disabled = raState.multiSelected.size === 0;
}

function raSubmitMulti() {
  const el = document.getElementById('ra-choices');
  const q = el._q;
  if (!q || raState.multiSelected.size === 0) return;
  const selected = [...raState.multiSelected].sort((a, b) => a - b).map(i => q.opts[i]);
  el.innerHTML = '';
  el.style.display = 'none';
  document.getElementById('ra-quiz-actions').style.display = 'none';
  raState.answers[q.key] = selected;
  raAfterQuizAnswer(q.key);
}

function raAfterQuizAnswer(key) {
  const step = raState.quizStep;

  if (step === 4) {
    raShowHalfway(() => raAskQuiz(5));
    return;
  }

  if (step === TOTAL_QUIZ - 1) {
    raHideProgress();
    raGenerate();
    return;
  }

  raAskQuiz(step + 1);
}

/* ── Audit generation ───────────────────────────────────── */
async function raGenerate() {
  raShowAnalysisProgress();
  const dots = raTyping();

  try {
    const res = await fetch(RA_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brandInfo: raState.brand, quizAnswers: raState.answers })
    });
    raRemoveDots(dots);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    raHideAnalysisProgress();
    raState.audit = data.audit;
    raState.phase = 'chat';
    raAudit(data.audit);
    document.getElementById('ra-cta').style.display = 'block';
    document.getElementById('ra-main-title').textContent = 'Ask a follow-up question';
    raShowInput('Ask about your retention strategy...', 'followup');
    raShowSuggestions();
    raScrollToComposer();
  } catch (err) {
    raRemoveDots(dots);
    raHideAnalysisProgress();
    raBot('Something went wrong — please try running your audit again in a moment.');
    console.error('[RA Error]', err);
  }
}

/* ── Follow-up chat ─────────────────────────────────────── */
function getWeakAreas() {
  return QUIZ.map(q => {
    const ans = raState.answers[q.key];
    let isWeak = false;
    if (q.multi && Array.isArray(ans)) {
      isWeak = ans.some(a => {
        const idx = q.opts.indexOf(a);
        return q.weak.includes(idx);
      }) || ans.length === 0;
    } else {
      isWeak = q.weak.includes(q.opts.indexOf(ans));
    }
    return { key: q.key, isWeak, severity: isWeak ? 1 : 0 };
  }).filter(a => a.isWeak);
}

function raBuildSuggestionPool() {
  const asked = new Set(raState.chatHistory.map(h => h.user.toLowerCase().trim()));
  const weakKeys = getWeakAreas().map(w => w.key);
  const keyOrder = [...new Set([...weakKeys, ...QUIZ.map(q => q.key)])];
  const pool = [];
  keyOrder.forEach(key => {
    (SUGGESTED_BY_AREA[key] || []).forEach(q => {
      if (!pool.includes(q) && !asked.has(q.toLowerCase())) pool.push(q);
    });
  });
  return pool;
}

function raShowSuggestions() {
  if (raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS || raState.phase !== 'chat') return;
  const pool = raBuildSuggestionPool();
  const picked = [];
  for (let i = 0; i < pool.length && picked.length < 3; i++) {
    const q = pool[(raState.followUpCount + i) % pool.length];
    if (!picked.includes(q)) picked.push(q);
  }
  const el = document.getElementById('ra-suggestions');
  if (!picked.length) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = '<div id="ra-suggestions-label">Suggested questions</div>' +
    picked.map((q, i) => `<button class="ra-suggest" onclick="raAskSuggested(${i})">${q}</button>`).join('');
  el._questions = picked;
  raScrollToComposer();
}

function raAskSuggested(i) {
  const q = document.getElementById('ra-suggestions')._questions[i];
  if (!q || raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS) return;
  document.getElementById('ra-suggestions').style.display = 'none';
  raSendFollowUp(q);
}

async function raSendFollowUp(message) {
  if (raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS) { raShowSessionEnd(); return; }

  document.getElementById('ra-suggestions').style.display = 'none';
  raUser(message);
  raState.followUpCount++;
  raUpdateFollowUpCounter();
  raShowComposer(false);
  const dots = raTyping();

  try {
    const res = await fetch(RA_FOLLOWUP_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brandInfo: raState.brand, quizAnswers: raState.answers,
        audit: raState.audit, message, history: raState.chatHistory
      })
    });
    raRemoveDots(dots);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    raState.chatHistory.push({ user: message, assistant: data.reply });
    raBotMarkdown(data.reply);

    if (raState.followUpCount >= MAX_FOLLOWUPS) raShowSessionEnd();
    else { raShowInput('Ask another question...', 'followup'); raShowSuggestions(); raScrollToComposer(); }
  } catch (err) {
    raRemoveDots(dots);
    raBot('Something went wrong — please try your question again.');
    raShowInput('Ask about your retention strategy...', 'followup');
    raShowSuggestions();
    console.error('[RA Follow-up Error]', err);
  }
}

function raShowSessionEnd() {
  raState.sessionEnded = true;
  document.getElementById('ra-suggestions').style.display = 'none';
  raShowComposer(false);
  const el = document.createElement('div');
  el.className = 'ra-m bot ra-session-end';
  el.innerHTML =
    '<p><strong>Session complete.</strong> You\'ve explored 5 follow-up questions.</p>' +
    '<p>Book a demo or request a callback — Superfans experts will get in touch with you.</p>' +
    '<a href="https://www.superfans.io/demo" target="_blank" rel="noopener" style="display:inline-block;background:linear-gradient(135deg,#915EE9,#7B4FD4);color:#FAF6FF;padding:14px 28px;border-radius:14px;font-size:14px;font-weight:700;text-decoration:none;">Book a Demo / Request a Callback</a>';
  document.getElementById('ra-display-pane').appendChild(el);
  document.getElementById('ra-cta').style.display = 'block';
}

/* ── Message rendering ──────────────────────────────────── */
function raBot(html) {
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = html;
  document.getElementById('ra-display-pane').appendChild(el);
  return el;
}

function raBotMarkdown(md) {
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = raRenderBotContent(md);
  document.getElementById('ra-display-pane').appendChild(el);
  raAnimateBars(el);
  return el;
}

function raUser(text) {
  const el = document.createElement('div');
  el.className = 'ra-m usr';
  el.textContent = text;
  document.getElementById('ra-display-pane').appendChild(el);
}

function raAudit(md) {
  const el = document.createElement('div');
  el.className = 'ra-m bot ra-audit';
  el.innerHTML = raRenderBotContent(md);
  document.getElementById('ra-display-pane').appendChild(el);
  raAnimateBars(el);
}

function raTyping() {
  const el = document.createElement('div');
  el.className = 'ra-dots';
  el.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('ra-display-pane').appendChild(el);
  return el;
}

function raRemoveDots(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

function raRestart() {
  raState = {
    brand: {}, answers: {}, quizStep: 0, audit: null,
    followUpCount: 0, chatHistory: [], sessionEnded: false,
    phase: 'brand', multiSelected: new Set()
  };
  document.getElementById('ra-main-title').textContent = 'What brand are we auditing today?';
  document.getElementById('ra-display-pane').innerHTML = '';
  document.getElementById('ra-choices').innerHTML = '';
  document.getElementById('ra-choices').style.display = 'none';
  document.getElementById('ra-quiz-actions').style.display = 'none';
  document.getElementById('ra-halfway-msg').style.display = 'none';
  document.getElementById('ra-progress-wrap').style.display = 'none';
  document.getElementById('ra-progress-fill').style.width = '0';
  raHideAnalysisProgress();
  document.getElementById('ra-suggestions').innerHTML = '<div id="ra-suggestions-label">Suggested questions</div>';
  document.getElementById('ra-suggestions').style.display = 'none';
  document.getElementById('ra-cta').style.display = 'none';
  document.getElementById('ra-send').disabled = false;
  raShowInput('Enter your brand name...', 'name');
  raScrollToComposer();
}
</script>
