<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<style>
  /* ── COLOUR PALETTE ─────────────────────────────────── */
  /* #915EE9 accent | #0D0915 bg | #EEE0FE muted | #FAF6FF primary text */

  #ra-engine-section {
    width: 100%;
    max-width: 720px;
    margin: 60px auto;
    padding: 20px;
    font-family: -apple-system, 'Inter', BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #FAF6FF;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #ra-main-title {
    font-size: 32px;
    font-weight: 500;
    color: #FAF6FF;
    margin-bottom: 32px;
    text-align: center;
    letter-spacing: -0.5px;
  }

  #ra-input-container {
    width: 100%;
    background: #0D0915;
    border: 1px solid rgba(238, 224, 254, 0.2);
    border-radius: 32px;
    padding: 6px 16px 6px 20px;
    display: flex;
    align-items: center;

  .ra-leading-icon {
    color: #EEE0FE;
    font-size: 20px;
    display: flex;
    align-items: center;
    user-select: none;

  }

  #ra-inp {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #FAF6FF;
    font-size: 16px;
    padding: 12px 0;
  }
  #ra-inp::placeholder { color: rgba(238, 224, 254, 0.55); }
  #ra-inp:disabled { opacity: 0.45; cursor: not-allowed; }

  #ra-send {
    background: #915EE9;
    border: none;
    border-radius: 24px;
    padding: 10px 18px;
    color: #FAF6FF;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s, opacity 0.15s;
  }
  #ra-send:hover:not(:disabled) { filter: brightness(1.1); }
  #ra-send:disabled { opacity: 0.45; cursor: not-allowed; }

  #ra-display-pane {
    width: 100%;
    margin-top: 24px;
    display: flex;
    flex-direction: column;

  .ra-m {
    font-size: 14px;
    line-height: 1.6;
    padding: 14px 18px;
    border-radius: 18px;
    animation: raFadeIn 0.3s ease;
    width: 100%;
  }
  @keyframes raFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .ra-m.bot {
    background: #0D0915;
    border: 1px solid rgba(238, 224, 254, 0.15);
    color: #EEE0FE;
  }
  .ra-m.usr {
    background: rgba(145, 94, 233, 0.15);
    border: 1px solid rgba(145, 94, 233, 0.35);
    color: #915EE9;
    font-weight: 500;
  }

  /* Response summary before audit */
  .ra-summary { padding: 18px 20px; }
  .ra-summary-title {
    font-size: 13px;
    font-weight: 600;
    color: #915EE9;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 14px;
  }
  .ra-summary-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(238, 224, 254, 0.1);
  }
  .ra-summary-row:last-child { border-bottom: none; padding-bottom: 0; }
  .ra-summary-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(238, 224, 254, 0.65);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .ra-summary-value {
    font-size: 14px;
    color: #FAF6FF;
    font-weight: 500;
  }

  .ra-m.bot strong { color: #FAF6FF; font-weight: 600; }
  .ra-m.bot h2     { font-size: 18px; color: #915EE9; margin: 4px 0 12px; }
  .ra-m.bot h3     { font-size: 15px; color: #FAF6FF; margin: 16px 0 8px; }
  .ra-m.bot p      { color: #EEE0FE; margin: 8px 0; }
  .ra-m.bot ul, .ra-m.bot ol { padding-left: 20px; margin: 8px 0; }
  .ra-m.bot li     { color: #EEE0FE; margin-bottom: 6px; }
  .ra-m.bot hr     { border: none; border-top: 1px solid rgba(238, 224, 254, 0.15); margin: 16px 0; }
  .ra-m.bot table  { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
  .ra-m.bot th     { background: rgba(145, 94, 233, 0.12); color: #EEE0FE; padding: 10px; text-align: left; font-size: 11px; text-transform: uppercase; }
  .ra-m.bot td     { padding: 10px; border-bottom: 1px solid rgba(238, 224, 254, 0.1); color: #EEE0FE; }
  .ra-m.bot a      { color: #915EE9; }

  #ra-choices {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
  }
  .ra-opt {
    background: #0D0915;
    border: 1px solid rgba(238, 224, 254, 0.15);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    color: #EEE0FE;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ra-opt:hover {
    border-color: #915EE9;
    background: rgba(145, 94, 233, 0.1);
    color: #FAF6FF;
  }
  .ra-opt::before { content: "✦"; color: #915EE9; font-size: 14px; }

  /* Suggested follow-up prompts */
  #ra-suggestions {
    width: 100%;
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
  }
  #ra-suggestions-label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(238, 224, 254, 0.7);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .ra-suggest {
    background: rgba(145, 94, 233, 0.08);
    border: 1px dashed rgba(145, 94, 233, 0.4);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: #EEE0FE;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: all 0.2s;
  }
  .ra-suggest:hover {
    border-color: #915EE9;
    border-style: solid;
    color: #FAF6FF;
    background: rgba(145, 94, 233, 0.15);
  }

  .ra-dots {
    display: flex;
    gap: 6px;
    padding: 14px;
    align-items: center;
    justify-content: center;
  }
  .ra-dots span {
    width: 8px; height: 8px; border-radius: 50%; background: #915EE9;
    animation: raSpread 1.2s infinite ease-in-out;
  }
  .ra-dots span:nth-child(2) { animation-delay: 0.2s; }
  .ra-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes raSpread { 0%,60%,100%{transform:scale(0.8);opacity:0.3;} 30%{transform:scale(1.2);opacity:1;} }

  #ra-cta {
    width: 100%;
    margin-top: 24px;
    display: none;
    text-align: center;
  }
  #ra-cta a {
    display: inline-block;
    background: #915EE9;
    color: #FAF6FF;
    padding: 14px 32px;
    border-radius: 28px;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    transition: filter 0.15s;
  }
  #ra-cta a:hover { filter: brightness(1.1); }
  #ra-restart {
    display: block; margin: 16px auto 0;
    font-size: 12px; color: rgba(238, 224, 254, 0.65); cursor: pointer;
    background: none; border: none; font-family: inherit;
  }
  #ra-restart:hover { color: #FAF6FF; }

  .ra-session-end {
    text-align: center;
    padding: 20px;
  }
  .ra-session-end p { color: #EEE0FE; margin: 0 0 16px; }
</style>

<div id="ra-engine-section">
  <h2 id="ra-main-title">What brand are we auditing today?</h2>

  <div id="ra-input-container">
    <span class="ra-leading-icon">＋</span>
    <input id="ra-inp" type="text" autocomplete="off" onkeydown="if(event.key==='Enter')raSend()" />
    <button id="ra-send" onclick="raSend()">Run Audit</button>
  </div>

  <div id="ra-choices"></div>
  <div id="ra-suggestions">
    <div id="ra-suggestions-label">Explore your weak areas</div>
  </div>
  <div id="ra-display-pane" role="log" aria-live="polite"></div>

  <div id="ra-cta">
    <a href="https://www.superfans.io/demo" target="_blank" rel="noopener">
      Book a Call with Superfans.io →
    </a>
    <button id="ra-restart" onclick="raRestart()">Start a new audit</button>
  </div>
</div>

<script>
const RA_API = 'https://retention-audit-ai-8bve.onrender.com/api/audit';
const RA_FOLLOWUP_API = 'https://retention-audit-ai-8bve.onrender.com/api/follow-up';
const MAX_FOLLOWUPS = 5;

const CATEGORIES = [
  'Skincare & Beauty','Apparel & Fashion','Health & Supplements',
  'Food & Beverage','Hair Care','Home & Lifestyle','Pet Care',
  'Sports & Fitness','Jewelry & Accessories','Baby & Kids'
];

const QUIZ = [
  {
    key: 'q1',
    label: 'Loyalty Program',
    q: 'Do you have a loyalty program?',
    opts: [
      'Yes — active and performing well',
      "Yes — but it's not driving repeat purchases",
      'Planning to launch one',
      "No, we don't have one"
    ],
    weak: [1, 2, 3]
  },
  {
    key: 'q2',
    label: 'Pop-Up & Quiz',
    q: 'Do you use pop-ups or a personalisation quiz on your site?',
    opts: [
      'Yes — both a pop-up and a quiz',
      'Pop-up only, no quiz',
      'Quiz only, no pop-up',
      "Neither — we don't capture zero-party data"
    ],
    weak: [1, 2, 3]
  },
  {
    key: 'q3',
    label: 'Affiliate Program',
    q: 'Do you have an affiliate or ambassador program?',
    opts: [
      'Yes — active with strong ROI',
      "Yes — but affiliates aren't very engaged",
      'No — but planning one',
      "No, it hasn't been a priority"
    ],
    weak: [1, 2, 3]
  },
  {
    key: 'q4',
    label: 'Customer Feedback & UGC',
    q: 'How do you collect customer feedback and UGC?',
    opts: [
      'Post-purchase surveys + active UGC campaigns',
      'We collect reviews but minimal UGC',
      'Mostly organic mentions',
      "We don't have a structured process"
    ],
    weak: [1, 2, 3]
  },
  {
    key: 'q5',
    label: 'Communication',
    q: 'How do you stay connected with customers between purchases?',
    opts: [
      'Email + SMS + push notifications (we have a mobile app)',
      'Email + SMS',
      'Mostly email newsletters',
      "No structured between-purchase strategy"
    ],
    weak: [1, 2, 3]
  }
];

const SUGGESTED_BY_AREA = {
  q1: [
    'How should we redesign our loyalty program to reward behaviour, not just discounts?',
    'What VIP tier structure would work best for our category?',
    "What's the fastest way to launch a loyalty program that actually drives repeat purchases?"
  ],
  q2: [
    'What zero-party data questions should we ask on our pop-up for our category?',
    'How do we turn pop-up data into segmented retention flows?',
    'Why is a personalisation quiz more valuable than a standard email capture pop-up?'
  ],
  q3: [
    'How do we identify ambassadors from our existing customers?',
    'What incentive structure works best for a brand like ours?',
    'Why might our affiliate program be underperforming even with active affiliates?'
  ],
  q4: [
    'How do we turn reviews into a structured UGC and advocacy program?',
    'Why is customer participation a VIP progression signal?',
    'What post-purchase survey flow would help us build advocates?'
  ],
  q5: [
    'How would a mobile app change our between-purchase retention strategy?',
    'What should each channel (email, SMS, push) be responsible for?',
    'What lifecycle moments should anchor our between-purchase communication?'
  ]
};

const SUMMARY_FIELDS = [
  { key: 'brandName', label: 'Brand Name', get: () => raState.brand.name },
  { key: 'category', label: 'Category', get: () => raState.brand.category },
  { key: 'url', label: 'Web URL', get: () => raState.brand.url },
  { key: 'q1', label: 'Loyalty Program', get: () => raState.answers.q1 },
  { key: 'q2', label: 'Pop-Up & Quiz', get: () => raState.answers.q2 },
  { key: 'q3', label: 'Affiliate Program', get: () => raState.answers.q3 },
  { key: 'q4', label: 'Customer Feedback & UGC', get: () => raState.answers.q4 },
  { key: 'q5', label: 'Communication', get: () => raState.answers.q5 }
];

let raState = {
  brand: {},
  answers: {},
  quizStep: 0,
  audit: null,
  followUpCount: 0,
  chatHistory: [],
  sessionEnded: false,
  phase: 'wizard'
};

window.addEventListener('DOMContentLoaded', () => {
  raShowInput('Enter your brand name...', 'name');
});

function raShowInput(placeholder, mode) {
  document.getElementById('ra-choices').style.display = 'none';
  const container = document.getElementById('ra-input-container');
  const inp = document.getElementById('ra-inp');
  const btn = document.getElementById('ra-send');
  container.style.display = 'flex';
  inp.placeholder = placeholder;
  inp.dataset.mode = mode;
  inp.value = '';
  inp.disabled = raState.sessionEnded;
  btn.disabled = raState.sessionEnded;
  btn.textContent = mode === 'followup' ? 'Ask' : 'Run Audit';
  if (!raState.sessionEnded) inp.focus();
}

function raShowChoices(options, onPick) {
  document.getElementById('ra-input-container').style.display = 'none';
  const el = document.getElementById('ra-choices');
  el.style.display = 'flex';
  el._onPick = onPick;
  el.innerHTML = options.map((opt, i) =>
    `<button class="ra-opt" onclick="raPick(${i})">${opt}</button>`
  ).join('');
}

function raPick(i) {
  const el = document.getElementById('ra-choices');
  const opts = el.querySelectorAll('.ra-opt');
  const text = opts[i].textContent;
  el.innerHTML = '';
  el.style.display = 'none';
  if (el._onPick) el._onPick(i, text);
}

function raSend() {
  const inp = document.getElementById('ra-inp');
  const val = inp.value.trim();
  if (!val || raState.sessionEnded) return;
  const mode = inp.dataset.mode;

  if (mode === 'followup') {
    inp.value = '';
    raSendFollowUp(val);
    return;
  }

  raHandleText(mode, val);
  inp.value = '';
  document.getElementById('ra-input-container').style.display = 'none';
}

function raHandleText(mode, val) {
  if (mode === 'name') {
    raState.brand.name = val;
    raRenderSummary();
    document.getElementById('ra-main-title').textContent = "Select your store's vertical";
    raShowChoices(CATEGORIES, (i, text) => {
      raState.brand.category = text;
      raRenderSummary();
      document.getElementById('ra-main-title').textContent = "What is your store's domain URL?";
      raShowInput('https://yourbrand.com', 'url');
    });
  } else if (mode === 'url') {
    raState.brand.url = val.startsWith('http') ? val : 'https://' + val;
    raState.quizStep = 0;
    raState.answers = {};
    raRenderSummary();
    raAskQuiz(0);
  }
}

function raAskQuiz(step) {
  const q = QUIZ[step];
  document.getElementById('ra-main-title').textContent = q.q;
  raShowChoices(q.opts, (i, text) => {
    raState.answers[q.key] = text;
    raRenderSummary();
    raState.quizStep++;
    if (raState.quizStep < QUIZ.length) {
      raAskQuiz(raState.quizStep);
    } else {
      raGenerate();
    }
  });
}

function raRenderSummary() {
  const pane = document.getElementById('ra-display-pane');
  let el = document.getElementById('ra-summary');
  if (!el) {
    el = document.createElement('div');
    el.id = 'ra-summary';
    el.className = 'ra-m bot ra-summary';
    pane.insertBefore(el, pane.firstChild);
  }

  const rows = SUMMARY_FIELDS
    .map(f => ({ label: f.label, value: f.get() }))
    .filter(f => f.value);

  if (!rows.length) return;

  el.innerHTML =
    '<div class="ra-summary-title">Your responses</div>' +
    rows.map(r =>
      `<div class="ra-summary-row">
        <span class="ra-summary-label">${r.label}</span>
        <span class="ra-summary-value">${r.value}</span>
      </div>`
    ).join('');
}

function getWeakAreas() {
  return QUIZ
    .map((q, idx) => {
      const answer = raState.answers[q.key];
      const optIdx = q.opts.indexOf(answer);
      const isWeak = q.weak.includes(optIdx);
      return { key: q.key, idx, isWeak, severity: isWeak ? (3 - Math.min(optIdx, 3)) : 0 };
    })
    .filter(a => a.isWeak)
    .sort((a, b) => b.severity - a.severity);
}

function raShowSuggestions() {
  const weak = getWeakAreas();
  const el = document.getElementById('ra-suggestions');
  const picked = [];
  const areas = weak.length ? weak.map(w => w.key) : ['q1', 'q2', 'q5'];

  for (const key of areas) {
    if (picked.length >= 3) break;
    const pool = SUGGESTED_BY_AREA[key] || [];
    const q = pool.find(item => !picked.includes(item));
    if (q) picked.push(q);
  }

  while (picked.length < 3) {
    const fallback = Object.values(SUGGESTED_BY_AREA).flat().find(q => !picked.includes(q));
    if (!fallback) break;
    picked.push(fallback);
  }

  el.style.display = 'flex';
  el.innerHTML = '<div id="ra-suggestions-label">Explore your weak areas</div>' +
    picked.map((q, i) =>
      `<button class="ra-suggest" onclick="raAskSuggested(${i})">${q}</button>`
    ).join('');
  el._questions = picked;
}

function raAskSuggested(i) {
  const el = document.getElementById('ra-suggestions');
  const q = el._questions[i];
  if (!q || raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS) return;
  document.getElementById('ra-suggestions').style.display = 'none';
  document.getElementById('ra-inp').value = q;
  raSendFollowUp(q);
}

async function raGenerate() {
  document.getElementById('ra-main-title').textContent = `Analyzing ${raState.brand.name}...`;
  const dots = raTyping();

  try {
    const res = await fetch(RA_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brandInfo: raState.brand,
        quizAnswers: raState.answers
      })
    });

    raRemoveDots(dots);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    raState.audit = data.audit;
    raState.phase = 'chat';

    raAudit(data.audit);
    document.getElementById('ra-cta').style.display = 'block';

    document.getElementById('ra-main-title').textContent = 'Ask a follow-up question';
    raShowSuggestions();
    raShowInput('Ask about your retention strategy...', 'followup');

  } catch (err) {
    raRemoveDots(dots);
    raBot('Something went wrong — please try running your audit again in a moment.');
    console.error('[RA Error]', err);
    raShowInput('Enter your brand name...', 'name');
  }
}

async function raSendFollowUp(message) {
  if (raState.sessionEnded || raState.followUpCount >= MAX_FOLLOWUPS) {
    raShowSessionEnd();
    return;
  }

  document.getElementById('ra-suggestions').style.display = 'none';
  raUser(message);
  raState.followUpCount++;
  const dots = raTyping();

  try {
    const res = await fetch(RA_FOLLOWUP_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brandInfo: raState.brand,
        quizAnswers: raState.answers,
        audit: raState.audit,
        message,
        history: raState.chatHistory
      })
    });

    raRemoveDots(dots);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const reply = data.reply;

    raState.chatHistory.push({ user: message, assistant: reply });
    raBotMarkdown(reply);

    if (raState.followUpCount >= MAX_FOLLOWUPS) {
      raShowSessionEnd();
    }

  } catch (err) {
    raRemoveDots(dots);
    raBot('Something went wrong — please try your question again in a moment.');
    console.error('[RA Follow-up Error]', err);
  }
}

function raShowSessionEnd() {
  raState.sessionEnded = true;
  document.getElementById('ra-suggestions').style.display = 'none';
  document.getElementById('ra-input-container').style.display = 'none';

  const pane = document.getElementById('ra-display-pane');
  const el = document.createElement('div');
  el.className = 'ra-m bot ra-session-end';
  el.innerHTML =
    '<p>You\'ve explored 5 follow-up questions — great depth for a first session.</p>' +
    '<p>To go further, book a demo or request a callback and Superfans experts will get in touch with you.</p>' +
    '<a href="https://www.superfans.io/demo" target="_blank" rel="noopener" style="display:inline-block;background:#915EE9;color:#FAF6FF;padding:14px 32px;border-radius:28px;font-size:15px;font-weight:700;text-decoration:none;">Book a Demo / Request a Callback →</a>';
  pane.appendChild(el);

  document.getElementById('ra-cta').style.display = 'block';
}

function raBot(html) {
  const pane = document.getElementById('ra-display-pane');
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = html;
  pane.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return el;
}

function raBotMarkdown(markdown) {
  const pane = document.getElementById('ra-display-pane');
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = (typeof marked !== 'undefined') ? marked.parse(markdown) : markdown.replace(/\n/g, '<br>');
  pane.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  return el;
}

function raUser(text) {
  const pane = document.getElementById('ra-display-pane');
  const el = document.createElement('div');
  el.className = 'ra-m usr';
  el.textContent = text;
  pane.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function raAudit(markdown) {
  const pane = document.getElementById('ra-display-pane');
  const el = document.createElement('div');
  el.className = 'ra-m bot';
  el.innerHTML = (typeof marked !== 'undefined') ? marked.parse(markdown) : markdown.replace(/\n/g, '<br>');
  pane.appendChild(el);
}

function raTyping() {
  const pane = document.getElementById('ra-display-pane');
  const el = document.createElement('div');
  el.className = 'ra-dots';
  el.innerHTML = '<span></span><span></span><span></span>';
  pane.appendChild(el);
  return el;
}

function raRemoveDots(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}

function raRestart() {
  raState = {
    brand: {},
    answers: {},
    quizStep: 0,
    audit: null,

    sessionEnded: false,
    phase: 'wizard'
  };
